{{define "layout_head"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GovScout</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
</head>
<body>
<nav>
<div class="container">
<a href="/opportunities" class="brand">GovScout</a>
<div class="nav-links">
<a href="/opportunities">Opportunities</a>
<a href="/alerts">My Alerts</a>
{{if .User}}{{if .User.IsAdmin}}<a href="/admin/sync-runs">Admin</a>{{end}}
<form method="POST" action="/logout" style="display:inline">
<button type="submit" class="btn btn-logout">Sign out</button>
</form>
{{end}}
</div>
</div>
</nav>
<div class="container page">
{{end}}

{{define "layout_foot"}}
</div>
<div id="toast-container"></div>
<script>
document.addEventListener("DOMContentLoaded",function(){
  var m=document.cookie.split(";").map(function(c){return c.trim()}).find(function(c){return c.startsWith("flash=")});
  if(!m)return;
  document.cookie="flash=;path=/;max-age=0";
  var v=decodeURIComponent(m.substring(6)),i=v.indexOf(":"),kind=v.substring(0,i),msg=v.substring(i+1);
  var t=document.createElement("div");
  t.className="toast toast-"+kind;
  t.innerHTML='<span>'+msg+'</span><button class="toast-close">&times;</button>';
  document.getElementById("toast-container").appendChild(t);
  t.querySelector(".toast-close").onclick=function(){t.classList.add("toast-out");setTimeout(function(){t.remove()},300)};
  setTimeout(function(){t.classList.add("toast-out");setTimeout(function(){t.remove()},300)},4000);
});
</script>
</body>
</html>
{{end}}
